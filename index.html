<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./main.js"></script>
    <style>
      #terminal::after {
        content: "_";
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-green-400 font-mono">

    <main class="min-h-screen flex items-center justify-center p-4">

      <div class="w-full max-w-2xl border border-zinc-700 rounded-xl overflow-hidden">

        <div class="border-b border-zinc-700 p-3 text-zinc-400 text-sm">
          jesse@portfolio:~
        </div>

        <div id="terminal" class="p-4 sm:p-6 text-sm sm:text-base whitespace-pre-wrap leading-relaxed"></div>
      </div>

    </main>

  </body>
</html>
